# Scenario C: template이 선언하지 않은 event(hooks.PermissionRequest)를 사용자가 추가한 경우.
# sync-codex-config.py는 template-undeclared leaf를 user-owned로 간주해 그대로 보존한다.
#
# 이전 baseline(issue #614 이전)에서는 hooks.SessionStart가 template 미선언이라 본 scenario의
# 검증 대상이었다. issue #614 이후 SessionStart도 template-declared가 되어 user entry 보존
# 워크플로는 더 이상 보장되지 않는다 (NG-6, sync-codex-config.py array AoT merge 한계 — issue #591).
# 본 fixture는 SessionStart 대신 Codex 0.124+에서 template 미선언인 PermissionRequest로 같은
# 정책을 검증한다.

model = "gpt-5.5"
approval_policy = "never"
sandbox_mode = "danger-full-access"

[[hooks.UserPromptSubmit]]
[[hooks.UserPromptSubmit.hooks]]
type = "command"
command = "$HOME/.codex/hooks/record-prompt-submit.sh"

[[hooks.Stop]]
[[hooks.Stop.hooks]]
type = "command"
command = "$HOME/.codex/hooks/_stop-dispatcher.sh"

[[hooks.PermissionRequest]]
[[hooks.PermissionRequest.hooks]]
type = "command"
command = "/tmp/test-marker-USER-PERMISSIONREQUEST-PRESERVED.sh"
