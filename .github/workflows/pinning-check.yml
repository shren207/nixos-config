name: Pinning Check

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]
  issues:
    types: [opened, edited]

permissions:
  contents: read
  issues: write

jobs:
  check-pinning:
    runs-on: ubuntu-latest
    steps:
      - name: Run pinning check
        # actions/github-script v7 pinned to the tag commit SHA.
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          script: |
            const RULES_PATH = 'scripts/ai/lib/pinning-rules.json';
            const COMMENT_MARKER = '<!-- pinning-check-comment -->';

            function targetFromPayload() {
              const pull = context.payload.pull_request;
              if (pull) {
                const headRepo = pull.head && pull.head.repo && pull.head.repo.full_name;
                const baseRepo = pull.base && pull.base.repo && pull.base.repo.full_name;
                return {
                  type: 'PR',
                  number: pull.number,
                  body: pull.body || '',
                  ref: pull.base.sha,
                  isFork: !headRepo || !baseRepo || headRepo !== baseRepo
                };
              }
              const issue = context.payload.issue;
              return {
                type: 'issue',
                number: issue.number,
                body: issue.body || '',
                ref: context.payload.repository.default_branch,
                isFork: false
              };
            }

            async function loadRules(ref) {
              const response = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: RULES_PATH,
                ref
              });
              const data = response.data;
              if (!data || Array.isArray(data) || data.type !== 'file' || !data.content) {
                throw new Error(`Unable to load ${RULES_PATH} from trusted ref ${ref}`);
              }
              const decoded = Buffer.from(data.content, data.encoding || 'base64').toString('utf8');
              return JSON.parse(decoded);
            }

            function validReason(line, marker, minLength) {
              const index = line.indexOf(marker);
              if (index < 0) return false;
              const reason = line.slice(index + marker.length).replace(/\s*-->\s*$/, '').trim();
              return reason.length >= minLength;
            }

            function isSameLineAllowed(line, rules) {
              const minLength = rules.markers.min_reason_length;
              return validReason(line, rules.markers.same_line.shell, minLength)
                || validReason(line, rules.markers.same_line.markdown, minLength);
            }

            function isNextLineMarker(line, rules) {
              const minLength = rules.markers.min_reason_length;
              return validReason(line, rules.markers.next_line.shell, minLength)
                || validReason(line, rules.markers.next_line.markdown, minLength);
            }

            function scrubAllowlistedRefs(line, rules) {
              let scrubbed = line;
              scrubbed = scrubbed.replace(new RegExp(rules.allowlist.urls.js_regex, 'g'), '');
              scrubbed = scrubbed.replace(new RegExp(rules.allowlist.cross_repo_refs.js_regex, 'g'), '');
              scrubbed = scrubbed.replace(new RegExp(rules.allowlist.closing_refs.js_regex, 'g'), '');
              return scrubbed;
            }

            function partialHashAllowed(match, rule) {
              const filter = (rule.post_filters || []).find((item) => item.type === 'partial_hash');
              if (!filter) return true;
              let token = match;
              if (filter.strip_backticks) token = token.replace(/`/g, '');
              if (filter.exclude_full_sha_length && token.length === filter.exclude_full_sha_length) return false;
              if (token.length < filter.min_length || token.length > filter.max_length) return false;
              if (filter.require_hex_alpha && !/[a-f]/.test(token)) return false;
              return true;
            }

            function firstMatch(line, rule, rules) {
              const target = rule.kind === 'bare_issue_ref' ? scrubAllowlistedRefs(line, rules) : line;
              if (rule.kind === 'partial_hash') {
                const regex = new RegExp(rule.matchers.js_regex, 'g');
                let match;
                while ((match = regex.exec(target)) !== null) {
                  if (partialHashAllowed(match[0], rule)) return match[0];
                }
                return null;
              }
              const regex = new RegExp(rule.matchers.js_regex);
              const match = target.match(regex);
              if (!match) return null;
              return match[2] || match[0];
            }

            function scanText(text, rules) {
              const findings = [];
              const lines = text.split('\n');
              let skipNext = false;
              for (let i = 0; i < lines.length; i += 1) {
                const line = lines[i];
                let allowNonReferenceRules = false;
                if (skipNext) {
                  allowNonReferenceRules = true;
                  skipNext = false;
                }
                if (isSameLineAllowed(line, rules)) allowNonReferenceRules = true;
                if (isNextLineMarker(line, rules)) {
                  allowNonReferenceRules = true;
                  skipNext = true;
                }
                for (const rule of rules.rules) {
                  if (!rule.contexts.includes('github_body')) continue;
                  if (allowNonReferenceRules && rule.kind !== 'bare_issue_ref') continue;
                  const match = firstMatch(line, rule, rules);
                  if (match) {
                    findings.push({
                      line: i + 1,
                      rule: rule.id,
                      match,
                      message: rule.message
                    });
                  }
                }
              }
              return findings;
            }

            function renderComment(target, findings, rules) {
              const minLength = rules.markers.min_reason_length;
              const findingList = findings.map((finding) =>
                `- **${finding.rule}** (line ${finding.line}): \`${finding.match}\` - ${finding.message}`
              ).join('\n');
              return [
                COMMENT_MARKER,
                '## Pinning Check Failed',
                '',
                `${target.type} body contains fragile process metadata patterns:`,
                '',
                findingList,
                '',
                '### How to fix',
                '',
                '- Prefer GitHub issue/PR URLs or `owner/repo#N` references.',
                '- Keep same-repo closing keywords such as `Closes #N` only on closing-keyword lines.',
                `- For intentional non-reference metadata exceptions, add \`${rules.markers.same_line.shell} <reason ${minLength}+ chars>\` or \`${rules.markers.same_line.markdown} <reason ${minLength}+ chars> -->\`.`,
                '',
                `Rules source: \`${RULES_PATH}\` from trusted ref \`${target.ref}\`.`
              ].join('\n');
            }

            function renderResolvedComment(target, rules) {
              return [
                COMMENT_MARKER,
                '## Pinning Check Passed',
                '',
                `${target.type} body no longer contains fragile process metadata patterns.`,
                '',
                `Rules source: \`${RULES_PATH}\` from trusted ref \`${target.ref}\`.`
              ].join('\n');
            }

            async function findPreviousComment(target) {
              const params = {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: target.number,
                per_page: 100
              };
              for await (const response of github.paginate.iterator(github.rest.issues.listComments, params)) {
                const previous = response.data.find((comment) =>
                  comment.user && comment.user.login === 'github-actions[bot]' && comment.body && comment.body.includes(COMMENT_MARKER)
                );
                if (previous) return previous;
              }
              return null;
            }

            async function upsertComment(target, body) {
              const previous = await findPreviousComment(target);
              if (previous) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: previous.id,
                  body
                });
                return;
              }
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: target.number,
                body
              });
            }

            async function resolveComment(target, body) {
              const previous = await findPreviousComment(target);
              if (!previous) return;
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: previous.id,
                body
              });
            }

            const target = targetFromPayload();
            const canComment = !target.isFork;
            if (!canComment) {
              core.warning('Fork pull request detected; scanning body but skipping comment writes.');
            }

            const rules = await loadRules(target.ref);
            const findings = scanText(target.body, rules);
            if (findings.length === 0) {
              if (canComment) {
                await resolveComment(target, renderResolvedComment(target, rules));
              }
              core.info(`No pinning findings in ${target.type} #${target.number}`);
              return;
            }

            const comment = renderComment(target, findings, rules);
            if (canComment) {
              await upsertComment(target, comment);
            }
            core.setFailed(`Pinning findings: ${findings.length} in ${target.type} #${target.number}`);
