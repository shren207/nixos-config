personality = "pragmatic"
model = "gpt-5.5"
model_auto_compact_token_limit = 900000
model_context_window = 1000000
model_reasoning_effort = "xhigh"
approval_policy = "never"
sandbox_mode = "danger-full-access"
suppress_unstable_features_warning = true

[notice]
hide_full_access_warning = true

[notice.model_migrations]
"gpt-5.2" = "gpt-5.2-codex"

[features]
multi_agent = true
apps = true
prevent_idle_sleep = true
goals = true
default_mode_request_user_input = true

# Codex 0.124+ stable hooks (issue #585 / epic #584).
# `codex_hooks` feature flag는 PR openai/codex#19012로 default-enabled가 되어 명시
# 활성화 불필요. 발화 미실측 시 rollback path = `[features].codex_hooks = true`.
# Stop은 _stop-dispatcher.sh 단일 entry로 등록 (Codex가 같은 이벤트의 multiple command를
# concurrent 실행하므로 ordering 보장을 dispatcher에 위임).
# subagent agent_id 부재 등은 graceful fallback에 의존.
#
# 사용자 hook 추가 워크플로 주의 (sync-codex-config.py 정책):
# template이 선언한 `[[hooks.UserPromptSubmit]]`, `[[hooks.Stop]]`, `[[hooks.PreToolUse]]`,
# `[[hooks.PostToolUse]]`, `[[hooks.SessionStart]]`
# array에 사용자가 별도 entry를 추가하면, nrs 재실행 시 array 전체가 template-owned로
# 덮어써져 사용자 entry가 손실된다. 보존되는 사용자 hook 등록은 다음 한 가지뿐이다:
#   - template이 선언하지 않은 다른 이벤트(현재 0.124+에서는 `PermissionRequest`)에 추가.
# Stop dispatcher 경유 sub-script 등록은 _stop-dispatcher.sh 자체가 tracked 파일이므로
# 본 repo의 dispatcher 수정이 필요하며 user-config 작업으로는 지원되지 않는다.
# same-event append/identity merge는 sync-codex-config.py 변경 필요로 별도 follow-up.
# PreToolUse pinning-guard는 issue #587에서 template-owned로 등록되었다.
# PostToolUse pinning-alert는 issue #603에서 template-owned로 등록되었다.
# SessionStart handoff-session-start는 issue #614에서 template-owned로 등록되었다.

[[hooks.UserPromptSubmit]]

[[hooks.UserPromptSubmit.hooks]]
type = "command"
command = "$HOME/.codex/hooks/record-prompt-submit.sh"

[[hooks.Stop]]

[[hooks.Stop.hooks]]
type = "command"
command = "$HOME/.codex/hooks/_stop-dispatcher.sh"

[[hooks.PreToolUse]]

[[hooks.PreToolUse.hooks]]
type = "command"
command = "$HOME/.codex/hooks/pinning-guard.sh"

[[hooks.PostToolUse]]

[[hooks.PostToolUse.hooks]]
type = "command"
command = "$HOME/.codex/hooks/pinning-alert.sh"

# SessionStart hook (issue #614): Codex 0.124+에서 plain stdout 또는 JSON
# additionalContext가 모델 컨텍스트로 자동 주입된다. handoff-session-start.sh가
# .claude/handoffs/<branch-slug>-<branch-hash>.md 존재 시 compact metadata + link를
# stdout으로 출력해 cross-runtime resume을 자동화한다 (DEC-S3 I2 + DEC-codex-start).
# Codex SessionEnd는 미지원이라 등록하지 않으며, full snapshot+commit은 _stop-dispatcher.sh
# 안에서 handoff-stop.sh가 turn-counter + transcript mtime 기반으로 trigger한다 (DEC-S6 B refined).
[[hooks.SessionStart]]

[[hooks.SessionStart.hooks]]
type = "command"
command = "$HOME/.codex/hooks/handoff-session-start.sh"
