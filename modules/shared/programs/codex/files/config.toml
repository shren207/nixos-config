personality = "pragmatic"
model = "gpt-5.5"
model_auto_compact_token_limit = 900000
model_context_window = 1000000
model_reasoning_effort = "xhigh"
approval_policy = "never"
sandbox_mode = "danger-full-access"

[notice]
hide_full_access_warning = true

[notice.model_migrations]
"gpt-5.2" = "gpt-5.2-codex"

[features]
multi_agent = true
apps = true
prevent_idle_sleep = true

# Codex 0.124+ stable hooks (issue #585 / epic #584).
# `codex_hooks` feature flag는 PR openai/codex#19012로 default-enabled가 되어 명시
# 활성화 불필요. 발화 미실측 시 rollback path = `[features].codex_hooks = true`.
# Stop은 _stop-dispatcher.sh 단일 entry로 등록 (Codex가 같은 이벤트의 multiple command를
# concurrent 실행하므로 ordering 보장을 dispatcher에 위임).
# subagent agent_id 부재 등은 graceful fallback에 의존 (#586 fixture가 측정).
#
# 사용자 hook 추가 워크플로 주의 (sync-codex-config.py 정책):
# template이 선언한 `[[hooks.UserPromptSubmit]]` 또는 `[[hooks.Stop]]` array에 사용자가
# 별도 entry를 추가하면, nrs 재실행 시 array 전체가 template-owned로 덮어써져 사용자
# entry가 손실된다 (epic #584 PoC 시나리오 B). 사용자 hook을 추가하려면:
#   (1) template이 선언하지 않은 다른 이벤트(`PreToolUse`/`SessionStart` 등)에 추가,
#   (2) 또는 별도 dispatcher wrapper에 sub-script로 등록 후 dispatcher만 template에 둔다.
# 본 epic의 non-goal: same-event append/identity merge는 sync-codex-config.py 변경이
# 필요하므로 별도 follow-up.

[[hooks.UserPromptSubmit]]

[[hooks.UserPromptSubmit.hooks]]
type = "command"
command = "$HOME/.codex/hooks/record-prompt-submit.sh"

[[hooks.Stop]]

[[hooks.Stop.hooks]]
type = "command"
command = "$HOME/.codex/hooks/_stop-dispatcher.sh"
