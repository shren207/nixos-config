# tmux.conf
# 주의: 경로 설정 시 ~/ 대신 $HOME 사용 필수 (run-shell 내에서 ~ 확장 안됨)

# ============================================================================
# 1. 기본 설정
# ============================================================================

# Extended keys (CSI u / Kitty Keyboard Protocol) 활성화
# Claude Code 등 CSI u를 사용하는 애플리케이션과의 호환성 개선
set -g extended-keys on
set -s extended-keys on
set -g extended-keys-format csi-u
set -as terminal-features 'xterm*:extkeys'

# True color 및 터미널 오버라이드
set -ga terminal-overrides ",xterm-256color:Tc"
set -ga terminal-overrides ",xterm-ghostty:Tc"
set -ga terminal-overrides ",tmux-256color:Tc"

# 창/pane 이름 자동 변경 비활성화
set -g automatic-rename off
set -g allow-rename off

# 메시지 표시 시간
set -g display-time 2000

# 에디터 설정
set-environment -g EDITOR "nvim"

# pane-base-index (base-index는 Nix에서 설정, pane-base-index는 HM 옵션 없음)
setw -g pane-base-index 1

# 윈도우 번호 자동 재정렬
set -g renumber-windows on

# OSC 52 클립보드
set -g set-clipboard on

# ============================================================================
# 2. 마우스 및 스크롤 설정
# ============================================================================

# 마우스 휠 스크롤 자동화
# - 마우스 이벤트 사용 앱(vim, less 등) 실행 시: 해당 앱에 전달
# - copy-mode일 때: 스크롤
# - 그 외: copy-mode 진입 후 스크롤
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -X scroll-up' 'copy-mode -e; send-keys -X scroll-up'"
bind -n WheelDownPane select-pane -t= \; send-keys -M

# ============================================================================
# 3. Pane 설정
# ============================================================================

# 경계선 스타일
set -g pane-border-style fg=cyan,bg=default
set -g pane-active-border-style fg=red,bg=default,bold
set -g pane-border-lines heavy

# Pane 배경색 (활성/비활성 구분)
set -g window-active-style 'fg=terminal,bg=terminal'
set -g window-style 'fg=colour245,bg=default'

# Pane 제목 표시 (상단)
# 표시 예시:
#   [ main]: my-task 🗒️  (Git + 제목 + 노트)
#   [ main]: my-task      (Git + 제목)
#   [ main]: 🚨pane 이름을 작성해주세요  (Git + 제목 미설정)
#   [🚨 Git 프로젝트가 아님!]: my-task    (Git 아님)
# 노트 아이콘(🗒️): prefix+N으로 노트 생성 후 내용이 있을 때 표시
set -g pane-border-status top
set -g pane-border-format ' #{?pane_active,#[fg=yellow]#[bold],#[fg=cyan]#[bold]}#[fg=yellow]#[bold][#(cd "#{pane_current_path}" && branch=$(git symbolic-ref --short HEAD 2>/dev/null) && echo " $branch" || echo "🚨 Git 프로젝트가 아님!")]#{?@custom_pane_title,: #[fg=magenta]#[bold]#{@custom_pane_title},: #[fg=magenta]#[dim]🚨pane 이름을 작성해주세요}#[default] #{?@pane_note_path, #[fg=blue]#( [ -s "#{@pane_note_path}" ] && echo " 🗒️"),}'

# ============================================================================
# 4. 상태 표시줄 설정
# ============================================================================

set -g status-position top
set -g status-style bg=black,fg=white
set -g status-justify left
set -g status-interval 5

# 왼쪽: 세션 이름
set -g status-left-length 20
set -g status-left '#[fg=cyan,bold]S: #S'

# 오른쪽: 현재 경로 + Git 브랜치
set -g status-right-length 150
set -g status-right '#[fg=cyan,bold]#(sh -c "printf %s \"#{pane_current_path}\" | sed \"s|^$HOME|~|\") #[fg=yellow,bold](#(cd "#{pane_current_path}" && git symbolic-ref --short HEAD 2>/dev/null || echo "")) #[default]'

# 창 목록 스타일
setw -g window-status-format ' #I:#W '
setw -g window-status-current-format '#[fg=black,bg=yellow,bold] #I:#W '

# ============================================================================
# 5. 키 바인딩
# ============================================================================

# 충돌 방지를 위한 unbind
unbind -T prefix n
unbind -T prefix y
unbind -T prefix v
unbind -T prefix u
unbind -T prefix P
unbind -T prefix I
unbind -T prefix r
unbind -T prefix N
unbind -T prefix K
unbind -T prefix T
unbind -T prefix R
unbind -T prefix C
unbind -T prefix F

# 설정 리로드
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded!"

# 세션/창 관리
bind-key s choose-session -F "#{?session_attached,#[fg=red bold],}#{session_name}: #{session_windows} windows"
bind-key , command-prompt -p "New window name:" "rename-window '%%'"
bind-key $ command-prompt -p "New session name:" "rename-session '%%'"
bind-key I command-prompt -p "Custom pane title:" "set -p @custom_pane_title '%%%'; display-message 'Pane title set to %%%'"
# Prompt preset 브라우저 (fzf 프리뷰 + 변수 편집 UI)
bind-key -T prefix P display-popup -E -w 80% -h 80% "$HOME/.local/bin/cheat-browse --prompts"

# ============================================================================
# 6. Pane Notepad 기능
# ============================================================================

set -g @pane_note_sticky 0

# NOTE: pane-focus-in hook 제거됨
# tmux-resurrect 복원 시 hook이 먼저 실행되어 복원된 값을 덮어쓰는 문제 해결
# @pane_note_path는 노트 명령어 사용 시 자동 설정됨

# 노트 관련 단축키
bind-key n run-shell "$HOME/.tmux/scripts/pane-note.sh edit"          # 노트 편집
bind-key y run-shell "$HOME/.tmux/scripts/pane-note.sh add-clipboard" # 클립보드 추가
bind-key v run-shell "$HOME/.tmux/scripts/pane-note.sh view"          # 읽기 전용
bind-key u run-shell "$HOME/.tmux/scripts/pane-note.sh open-url"      # URL 열기

# 노트 관리 단축키
bind-key -T prefix N command-prompt -p "New note title:" "run-shell \"$HOME/.tmux/scripts/pane-note.sh new '%%'\""
# Cheat sheet 브라우징 (fzf 미리보기 + Ctrl-S content 모드 전환)
bind-key -T prefix C display-popup -E -w 80% -h 80% "$HOME/.local/bin/cheat-browse"

# ★ fzf 사용 스크립트는 display-popup 필수 (tty 필요)
bind-key -T prefix K display-popup -E -w 95% -h 80% "$HOME/.tmux/scripts/pane-link.sh"
bind-key -T prefix T display-popup -E -w 60% -h 50% "$HOME/.tmux/scripts/pane-tag.sh"
bind-key -T prefix R display-popup -E -w 95% -h 80% "$HOME/.tmux/scripts/pane-restore.sh"
