pre-commit:
  parallel: true
  commands:
    ai-skills-consistency:
      run: bash ./scripts/ai/warn-skill-consistency.sh
    gitleaks:
      run: gitleaks protect --staged --no-banner --redact
    nixfmt:
      glob: "*.nix"
      run: nixfmt --check {staged_files}
    shellcheck:
      glob: "*.sh"
      run: shellcheck -S warning {staged_files}
    eval-tests:
      run: bash ./tests/run-eval-tests.sh
    codex-hook-fixtures:
      # deterministic 모드 (live fixture 미실행). runner 자체가 scripts/ai/lib/tomlkit-bootstrap.sh를
      # source하여 repo-pinned pythonWithTomlkit으로 self-wrap하므로 lefthook에서 추가 nix shell
      # wrap이 불필요하다. live propagation 검증은 manual/scheduled에 위임.
      run: bash ./tests/test-codex-hook-fixtures.sh --no-live
    pinning:
      # warn-only — staged added-lines에서 박제 패턴 검사. SSOT는 scripts/ai/lib/pinning-rules.json.
      # 워크트리/cherry-pick 시나리오에서 lefthook.yml만 받고 스크립트 미동반 시 silent skip.
      run: '[ -f ./scripts/ai/pre-commit-pinning.sh ] && bash ./scripts/ai/pre-commit-pinning.sh || true'

commit-msg:
  commands:
    pinning:
      # 워크트리/cherry-pick 시나리오에서 lefthook.yml만 받고 스크립트 미동반 시
      # 차단 회피용 방어 가드 (silent skip).
      run: '[ -f ./scripts/ai/commit-msg-pinning.sh ] && bash ./scripts/ai/commit-msg-pinning.sh {1} || true'

pre-push:
  commands:
    shell-script-tests:
      # nix shell wrap: codex-config fixture가 tomlkit을 필요로 하므로, repo-pinned
      # packages.${system}.pythonWithTomlkit(flake.nix)를 PATH에 얹어 실행. devShell은
      # 건드리지 않아 direnv/bare python3 해석 영향이 없고, nixpkgs# 임시 registry
      # fetch 대신 flake input에 고정된 store path를 재사용해 오버헤드도 최소화.
      # `_TOMLKIT_BOOTSTRAP_READY=1` env를 명시적으로 넘겨, `tests/run-shell-script-tests.sh`
      # 내부의 tomlkit-bootstrap.sh가 중첩 `nix shell ...`을 다시 exec하지 않도록 한다.
      run: nix shell .#pythonWithTomlkit --command env _TOMLKIT_BOOTSTRAP_READY=1 bash ./tests/run-shell-script-tests.sh
    codex-hook-fixtures:
      # pre-commit에 이미 동일 명령이 있지만 push 직전 재검증해 stale state 회귀 차단.
      # runner self-bootstrap이라 추가 nix shell wrap 불필요. live propagation은 attach하지 않음.
      run: bash ./tests/test-codex-hook-fixtures.sh --no-live
    pinning-rules:
      run: '[ ! -f ./tests/test-pinning-rules.sh ] || bash ./tests/test-pinning-rules.sh'
    flake-check:
      run: nix flake check --no-build --all-systems
