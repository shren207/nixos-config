pre-commit:
  parallel: true
  commands:
    lefthook-guard-self-check:
      # 회귀 방지 layer: 인접 worktree의 `lefthook install`이 (worktree-local 격리 없이)
      # 메인 .git/hooks/pre-commit을 덮어쓰면서 staged-config guard를 silently 제거하는
      # 시나리오를 commit-time에 fail-fast로 잡는다. install-lefthook-hooks.sh가
      # 호출되는 worktree는 자기 worktree-local hook에 격리되어 안전하지만, 메인 repo
      # hook은 8개 inline shellHook worktree(NG-1)의 매 direnv 진입으로 덮어써질 수
      # 있다. 본 check가 메인에서 commit 시도 시 guard 부재를 발견하고 차단한다.
      # parallel: true이지만 어느 command든 fail이면 commit이 차단되므로 순서는 무관.
      run: |
        hook_path="$(git rev-parse --path-format=absolute --git-path hooks/pre-commit)"
        if [ ! -f "$hook_path" ] || ! grep -Fq "# BEGIN nixos-config lefthook staged-config guard" "$hook_path"; then
          echo "lefthook-guard-self-check: staged-config guard missing from $hook_path." >&2
          echo "  Cause: another worktree's 'lefthook install' likely overwrote the shared hook." >&2
          echo "  Fix:   re-run 'direnv reload' or 'bash scripts/ai/install-lefthook-hooks.sh' in the current worktree." >&2
          exit 1
        fi
    ai-skills-consistency:
      run: bash ./scripts/ai/run-staged-snapshot.sh -- bash ./scripts/ai/warn-skill-consistency.sh
    gitleaks:
      run: bash ./scripts/ai/run-gitleaks-staged-policy.sh
    nixfmt:
      glob: "*.nix"
      run: nixfmt --check {staged_files}
    shellcheck:
      glob: "*.sh"
      run: shellcheck -S warning {staged_files}
    eval-tests:
      run: bash ./scripts/ai/run-staged-snapshot.sh -- bash ./tests/run-eval-tests.sh
    codex-hook-fixtures:
      # deterministic 모드 (live fixture 미실행). runner 자체가 scripts/ai/lib/tomlkit-bootstrap.sh를
      # source하여 repo-pinned pythonWithTomlkit으로 self-wrap하므로 lefthook에서 추가 nix shell
      # wrap이 불필요하다. live propagation 검증은 manual/scheduled에 위임.
      run: bash ./scripts/ai/run-staged-snapshot.sh -- bash ./tests/test-codex-hook-fixtures.sh --no-live
    skill-noise-check:
      # shared skill projection (modules/shared/programs/claude/files/skills) 의 LLM 노이즈 syntax
      # (bold / excessive empty lines) 잔존 0 검증. pre-commit 은 staged snapshot 안에서
      # check-skill-noise.sh 의 기본 worktree 검사 경로를 사용한다.
      # script 는 Python stdlib only 라 nix shell wrap 불필요.
      run: bash ./scripts/ai/run-staged-snapshot.sh -- bash ./scripts/ai/check-skill-noise.sh
    local-skill-noise-check:
      # repo-local project skill corpus (.claude/skills) 의 동일 invariant 검증.
      # .agents/skills 는 .claude/skills 를 가리키는 directory symlink projection 이므로
      # hook 에서는 원본 corpus 의 staged snapshot 을 직접 검사한다.
      run: bash ./scripts/ai/run-staged-snapshot.sh -- bash ./scripts/ai/check-skill-noise.sh .claude/skills

commit-msg:
  commands:
    lefthook-guard-self-check:
      # pre-commit의 guard-self-check 복제. lefthook 2.x는 staged files이 0인 commit
      # (예: `git commit --allow-empty`)에서 pre-commit command를 "(skip) no matching
      # staged files"로 무력화한다. commit-msg hook은 staged files와 무관하게 항상
      # 실행되므로, 이 layer가 staged-files-가-0인 경로의 우회 시나리오까지 차단한다.
      run: |
        hook_path="$(git rev-parse --path-format=absolute --git-path hooks/pre-commit)"
        if [ ! -f "$hook_path" ] || ! grep -Fq "# BEGIN nixos-config lefthook staged-config guard" "$hook_path"; then
          echo "lefthook-guard-self-check (commit-msg): staged-config guard missing from $hook_path." >&2
          echo "  Cause: another worktree's 'lefthook install' likely overwrote the shared hook." >&2
          echo "  Fix:   re-run 'direnv reload' or 'bash scripts/ai/install-lefthook-hooks.sh' in the current worktree." >&2
          exit 1
        fi
    pinning:
      # 워크트리/cherry-pick 시나리오에서 lefthook.yml만 받고 스크립트 미동반 시
      # 차단 회피용 방어 가드 (silent skip).
      run: '[ -f ./scripts/ai/commit-msg-pinning.sh ] && bash ./scripts/ai/commit-msg-pinning.sh {1} || true'

pre-push:
  commands:
    shell-script-tests:
      # nix shell wrap: codex-config fixture가 tomlkit을 필요로 하므로, repo-pinned
      # packages.${system}.pythonWithTomlkit(flake.nix)를 PATH에 얹어 실행. devShell은
      # 건드리지 않아 direnv/bare python3 해석 영향이 없고, nixpkgs# 임시 registry
      # fetch 대신 flake input에 고정된 store path를 재사용해 오버헤드도 최소화.
      # `_TOMLKIT_BOOTSTRAP_READY=1` env를 명시적으로 넘겨, `tests/run-shell-script-tests.sh`
      # 내부의 tomlkit-bootstrap.sh가 중첩 `nix shell ...`을 다시 exec하지 않도록 한다.
      run: nix shell .#pythonWithTomlkit --command env _TOMLKIT_BOOTSTRAP_READY=1 bash ./tests/run-shell-script-tests.sh
    codex-hook-fixtures:
      # pre-commit에 이미 동일 명령이 있지만 push 직전 재검증해 stale state 회귀 차단.
      # runner self-bootstrap이라 추가 nix shell wrap 불필요. live propagation은 attach하지 않음.
      run: bash ./tests/test-codex-hook-fixtures.sh --no-live
    flake-check:
      run: nix flake check --no-build --all-systems
    statusline-bats:
      # statusline.sh 폭 측정 fallback chain 회귀 검증. git hook PATH 는 devShell
      # buildInputs 를 보장하지 않으므로 `nix shell` wrap 으로 hook 실행 환경
      # PATH 와 무관하게 동작하게 한다. `--inputs-from .` 는 repo flake.lock 의
      # nixpkgs 입력을 재사용하여 `nix shell .#pythonWithTomlkit` 패턴과 동일하게
      # 프로젝트 pin 을 우회하지 않게 한다. pre-commit allowlist guard 우회를
      # 위해 pre-push 에 배치. bats 호출은 ~1초로 짧아 비용 미미.
      run: nix shell --inputs-from . nixpkgs#bats --command bats modules/shared/programs/claude/files/scripts/tests/statusline.bats
